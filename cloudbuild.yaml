steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['pull', 'northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/mikie-sportswear-git:latest']
    allowFailure: true

  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '--cache-from', 'northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/mikie-sportswear-git:latest',
      '-t', 'northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/mikie-sportswear-git:latest',
      './backend'
    ]

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/mikie-sportswear-git:latest']

  - name: 'gcr.io/cloud-builders/gcloud'
    args: [
      'run', 'deploy', 'mikie-sportswear-git',
      '--image', 'northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/mikie-sportswear-git:latest',
      '--region', 'northamerica-northeast2'
    ]