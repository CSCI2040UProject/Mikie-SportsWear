services:
  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules # Prevents host node_modules from overriding container's
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - maven-repo:/root/.m2 # Caches maven dependencies
    ports:
      - "8080:8080"

volumes:
  maven-repo:
